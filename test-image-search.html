<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>test image search</title>
<style>
  body { 
    font-family: 'Courier New', monospace; 
    padding: 20px; 
    background: #f0e0d6;
    font-size: 14px;
  }
  button {
    background: #0600FF;
    color: #F9FF00;
    border: none;
    padding: 16px 24px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    margin: 10px 0;
    width: 100%;
  }
  pre {
    background: #fff;
    padding: 12px;
    border: 1px solid #0600FF;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-size: 11px;
    max-height: 60vh;
    overflow: auto;
  }
  .result-img {
    width: 80px;
    height: 100px;
    object-fit: cover;
    margin: 4px;
    border: 1px solid #0600FF;
  }
  .summary {
    background: #F9FF00;
    padding: 12px;
    margin: 10px 0;
    border: 2px solid #0600FF;
    font-weight: bold;
  }
</style>
</head>
<body>

<h2>image search test</h2>
<p>tests the searchByImage netlify function with a sample eBay image</p>

<button onclick="runTest()">run test</button>

<div id="summary"></div>
<div id="images"></div>
<pre id="output">click button to start...</pre>

<script>
async function runTest() {
  const output = document.getElementById('output');
  const summary = document.getElementById('summary');
  const images = document.getElementById('images');
  
  output.textContent = 'searching...';
  summary.innerHTML = '';
  images.innerHTML = '';
  
  try {
    const res = await fetch('/.netlify/functions/searchByImage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        imageUrl: 'https://i.ebayimg.com/images/g/8wcAAOSwYDtkPLNS/s-l1600.jpg' 
      })
    });
    
    const data = await res.json();
    
    // big summary at top
    const count = data.itemSummaries?.length || 0;
    summary.innerHTML = `
      <div class="summary">
        STATUS: ${res.status}<br>
        ITEMS FOUND: ${count}<br>
        ${count > 0 ? '✅ WORKING' : '❌ NO ITEMS'}
      </div>
    `;
    
    // show actual image previews if we got results
    if (data.itemSummaries?.length) {
      images.innerHTML = data.itemSummaries.slice(0, 6).map(item => 
        `<img class="result-img" src="${item.image?.imageUrl || ''}" alt="">`
      ).join('');
    }
    
    // full response
    output.textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    summary.innerHTML = `<div class="summary">❌ ERROR: ${err.message}</div>`;
    output.textContent = err.toString();
  }
}
</script>

</body>
</html>

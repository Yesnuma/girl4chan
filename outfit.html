<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>outfit generator - girlchan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', Courier, monospace;
    background-color: #f0e0d6;
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 16px;
  }
  .explore-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #0600ff;
  }
  .back-link {
    font-size: 12px;
    color: #0600ff;
    text-decoration: none;
    cursor: pointer;
  }
  .back-link:hover { text-decoration: underline; }

  /* letter block title */
  .og-title {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-bottom: 6px;
    user-select: none;
  }
  .og-title-row { display: flex; }
  .letter-block {
    background: #F9FF00;
    border: 2px solid #000;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    color: #000;
    margin: 0 1px;
    font-family: 'Courier New', Courier, monospace;
  }
  .og-subtitle {
    text-align: center;
    font-size: 11px;
    color: #666;
    margin-bottom: 16px;
  }
  .og-subtitle span { color: #0600ff; font-weight: bold; }

  /* collage canvas */
  .canvas-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
  }
  .outfit-canvas {
    background: #fff;
    border: 2px solid #0600ff;
    width: 340px;
    height: 425px;
    position: relative;
    overflow: hidden;
    box-shadow: 6px 6px 0px #0600ff;
  }
  .outfit-canvas.landscape {
    width: 100%;
    max-width: 560px;
    height: 300px;
  }
  .layout-toggle {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .layout-toggle button {
    padding: 5px 12px;
    background: #fff;
    border: 1px solid #0600ff;
    color: #0600ff;
    font-family: 'Courier New', Courier, monospace;
    font-size: 10px;
    cursor: pointer;
  }
  .layout-toggle button.active {
    background: #0600ff;
    color: #F9FF00;
  }
  .canvas-empty {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 12px;
    color: #999;
    text-align: center;
    width: 80%;
    line-height: 1.6;
  }
  .collage-tile {
    position: absolute;
    background: transparent;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .collage-tile:hover { transform: scale(1.05); z-index: 20 !important; }
  .outfit-canvas.editing .collage-tile { transition: none; }
  .outfit-canvas.editing .collage-tile:hover { transform: none; }
  .collage-tile.selected {
    outline: 2px dashed #0600ff;
    outline-offset: 2px;
  }
  .collage-tile img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    max-width: 340px;
    margin: 0 auto 10px;
  }
  .btn-row .shuffle-btn { margin: 0; flex: 1; }
  .edit-btn {
    padding: 0 16px;
    background: #fff;
    color: #0600ff;
    border: 2px solid #000;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 3px 3px 0 #000;
  }
  .edit-btn.active {
    background: #F9FF00;
    color: #000;
  }
  .edit-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }

  .save-outfit-btn {
    display: block;
    width: 100%;
    max-width: 340px;
    margin: 0 auto 10px;
    padding: 10px;
    background: #fff;
    color: #ff007a;
    border: 2px solid #ff007a;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    text-transform: lowercase;
  }
  .save-outfit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .save-outfit-btn.saved {
    background: #ff007a;
    color: #fff;
  }

  .edit-controls {
    display: none;
    justify-content: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .edit-controls.show { display: flex; }
  .edit-controls button {
    padding: 8px 14px;
    background: #fff;
    border: 1px solid #0600ff;
    color: #0600ff;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    cursor: pointer;
  }
  .edit-controls button:disabled { opacity: 0.3; }
  .edit-hint {
    display: none;
    text-align: center;
    font-size: 10px;
    color: #0600ff;
    margin-bottom: 10px;
  }
  .edit-hint.show { display: block; }

  .shuffle-btn {
    display: block;
    width: 100%;
    max-width: 340px;
    margin: 0 auto 10px;
    padding: 15px;
    background: #0600ff;
    color: #F9FF00;
    border: 2px solid #000;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 3px 3px 0 #000;
    text-transform: lowercase;
  }
  .shuffle-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }
  .shuffle-btn:disabled { opacity: 0.5; cursor: wait; }

  .og-hint {
    text-align: center;
    font-size: 10px;
    color: #999;
    margin-bottom: 20px;
  }

  .closet-note {
    text-align: center;
    font-size: 10px;
    color: #666;
    padding: 8px;
    border-top: 1px dashed #c9b8ac;
  }
  .closet-note a { color: #0600ff; }

  @keyframes tileIn {
    from { opacity: 0; }
  }
</style>
</head>
<body>

<div class="explore-header">
  <a href="#" onclick="history.back(); return false;" class="back-link">← back</a>
  <a href="/" class="back-link">← home</a>
</div>

<div class="og-title">
  <div class="og-title-row">
    <div class="letter-block">O</div>
    <div class="letter-block">U</div>
    <div class="letter-block">T</div>
    <div class="letter-block">F</div>
    <div class="letter-block">I</div>
    <div class="letter-block">T</div>
  </div>
  <div class="og-title-row">
    <div class="letter-block">G</div>
    <div class="letter-block">E</div>
    <div class="letter-block">N</div>
    <div class="letter-block">E</div>
    <div class="letter-block">R</div>
    <div class="letter-block">A</div>
    <div class="letter-block">T</div>
    <div class="letter-block">O</div>
    <div class="letter-block">R</div>
  </div>
</div>

<div class="og-subtitle" id="ogSubtitle">loading closet...</div>

<div class="layout-toggle">
  <button id="modePortrait" class="active" onclick="setLayoutMode('portrait')">▯ portrait</button>
  <button id="modeLandscape" onclick="setLayoutMode('landscape')">▭ landscape</button>
</div>

<div class="canvas-wrap">
  <div class="outfit-canvas" id="outfitCanvas">
    <div class="canvas-empty" id="canvasEmpty">press shuffle ↓</div>
  </div>
</div>

<div class="btn-row">
  <button class="shuffle-btn" id="shuffleBtn" onclick="shuffleOutfit()" disabled>shuffle ✦</button>
  <button class="edit-btn" id="editBtn" onclick="toggleEditMode()">✎</button>
</div>
<button class="save-outfit-btn" id="saveBtn" onclick="saveOutfit()" disabled>save this ♡</button>
<div class="edit-hint" id="editHint">tap a piece to select it, drag to move</div>
<div class="edit-controls" id="editControls">
  <button onclick="resizeSelected(-1)">－ smaller</button>
  <button onclick="resizeSelected(1)">＋ bigger</button>
  <button onclick="layerSelected(-1)">↓ back</button>
  <button onclick="layerSelected(1)">↑ front</button>
</div>
<div class="og-hint" id="ogHint">tap any piece to shop it</div>

<div class="closet-note" id="closetNote"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { getFirestore, initializeFirestore, collection, addDoc, doc, getDoc, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDExgxdLsySYHaQp4UdXaxhQ0zcSAS72g4",
    authDomain: "girl-4chan.firebaseapp.com",
    projectId: "girl-4chan",
    storageBucket: "girl-4chan.firebasestorage.app",
    messagingSenderId: "290973679176",
    appId: "1:290973679176:web:2074819349d9f464ba227d"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = initializeFirestore(app, { experimentalAutoDetectLongPolling: true });

  // ── tag → generator category mapping (from girlchan's tag vocabulary) ──
  const CATEGORY_TAGS = {
    tops: ['baby-tee', 'tank-top', 'crop-top', 'halter-top', 'tube-top', 'butterfly-top',
           'hoodie', 'cardigan', 'sweater', 'corset', 'bodysuit', 'long-sleeve-top',
           'graphic-tee', 'turtleneck', 'polo', 'zip-up', 'top', 'tee', 'shirt', 'blouse', 'tank'],
    jackets: ['blazer', 'jacket', 'coat', 'windbreaker', 'puffer'],
    shortdress: ['mini-dress', 'babydoll-dress', 'sundress', 'party-dress', 'bodycon-dress', 'romper', 'dress'],
    longdress: ['midi-dress', 'maxi-dress', 'slip-dress', 'jumpsuit'],
    bottoms: ['low-rise-jeans', 'cargo-pants', 'maxi-skirt', 'midi-skirt',
              'pleated-skirt', 'denim-skirt', 'flare-jeans', 'baggy-jeans',
              'yoga-pants', 'leggings', 'sweatpants', 'track-pants',
              'wide-leg-pants', 'straight-leg-jeans', 'skinny-jeans', 'mom-jeans',
              'pants', 'jeans', 'skirt', 'trousers'],
    shortbottoms: ['mini-skirt', 'shorts', 'bike-shorts'],
    shoes: ['platform-shoes', 'heels', 'sneakers', 'mary-janes', 'ballet-flats',
            'shoes', 'sandals', 'flats', 'pumps', 'loafers', 'mules', 'stiletto', 'wedges'],
    boots: ['boots'],
    bags: ['bag', 'purse', 'handbag', 'tote', 'duffle', 'backpack', 'clutch'],
    accessories: ['belt', 'sunglasses', 'jewelry', 'hair-clip', 'necklace', 'earrings',
                  'bracelet', 'hat', 'scarf', 'ring', 'accessories', 'accessory']
  };

  function bucketItem(tags) {
    const t = (tags || []).map(x => String(x).toLowerCase());
    const order = ['longdress', 'shortdress', 'boots', 'shoes', 'bags', 'jackets', 'shortbottoms', 'bottoms', 'tops', 'accessories'];
    for (const cat of order) {
      if (CATEGORY_TAGS[cat].some(ct => t.includes(ct))) return cat;
    }
    return null; // not shuffleable — quietly skipped
  }

  // ── layout slots ──
  // portrait: her original paper-doll positions, verbatim
  // landscape: outfit column sits left-of-center, right column gives bags/accessories/footwear real room
  const SLOTS = {
    portrait: {
      tops:         { top: '3.33%', left: '50%', tx: true, width: '55%', height: '35%', z: 3 },
      jackets:      { top: '3.33%', left: '50%', tx: true, width: '62%', height: '48%', z: 3 },
      shortdress:   { top: '3.33%', left: '50%', tx: true, width: '55%', height: '55%', z: 3 },
      longdress:    { top: '3.33%', left: '50%', tx: true, width: '55%', height: '75%', z: 3 },
      bottoms:      { top: '30%',   left: '50%', tx: true, width: '50%', height: '50%', z: 2 },
      shortbottoms: { top: '33%',   left: '50%', tx: true, width: '42%', height: '24%', z: 2 },
      bags:         { top: '22.22%', left: '5.56%', width: '38%', height: '30%', z: 5 },
      accessories:  { top: '17.78%', right: '5.56%', width: '18%', height: '14%', z: 4 },
      shoes:        { bottom: '5.56%', left: '50%', tx: true, width: '35%', height: '20%', z: 1 },
      boots:        { bottom: '5.56%', left: '50%', tx: true, width: '48%', height: '28%', z: 1 }
    },
    landscape: {
      tops:         { top: '4%',  left: '50%', tx: true, width: '30%', height: '44%', z: 3 },
      jackets:      { top: '4%',  left: '50%', tx: true, width: '36%', height: '58%', z: 3 },
      shortdress:   { top: '4%',  left: '50%', tx: true, width: '32%', height: '66%', z: 3 },
      longdress:    { top: '3%',  left: '50%', tx: true, width: '32%', height: '88%', z: 3 },
      bottoms:      { top: '38%', left: '50%', tx: true, width: '28%', height: '56%', z: 2 },
      shortbottoms: { top: '42%', left: '50%', tx: true, width: '24%', height: '28%', z: 2 },
      bags:         { top: '18%', left: '4%', width: '26%', height: '44%', z: 5 },
      accessories:  { top: '18%', right: '4%', width: '20%', height: '28%', z: 4 },
      shoes:        { bottom: '4%', left: '50%', tx: true, width: '24%', height: '26%', z: 1 },
      boots:        { bottom: '4%', left: '50%', tx: true, width: '27%', height: '32%', z: 1 }
    }
  };

  let layoutMode = 'portrait';
  let lastPicks = null;
  let currentTiles = []; // [{tile, item, slot}] — for saving positions

  window.setLayoutMode = function(mode) {
    layoutMode = mode;
    document.getElementById('outfitCanvas').classList.toggle('landscape', mode === 'landscape');
    document.getElementById('modePortrait').classList.toggle('active', mode === 'portrait');
    document.getElementById('modeLandscape').classList.toggle('active', mode === 'landscape');
    if (lastPicks && lastPicks.length > 0) renderPicks(lastPicks);
  };

  let closet = { tops: [], jackets: [], shortdress: [], longdress: [], bottoms: [], shortbottoms: [], shoes: [], boots: [], bags: [], accessories: [] };
  let closetOwner = '';
  let closetSource = null;
  let totalShuffleable = 0;

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  window.shuffleOutfit = function() {
    const canvas = document.getElementById('outfitCanvas');
    canvas.innerHTML = '';

    const picks = []; // { item, slot }

    // dress vs separates — OG: 50% dress when any dress exists
    const allDresses = [
      ...closet.shortdress.map(i => ({ item: i, slot: 'shortdress' })),
      ...closet.longdress.map(i => ({ item: i, slot: 'longdress' }))
    ];
    const dressGenerated = allDresses.length > 0 && Math.random() < 0.5;

    if (dressGenerated) {
      picks.push(pick(allDresses));
    } else {
      // OG: 20% chance a jacket takes the top slot instead of a top
      const showJacket = closet.jackets.length > 0 && Math.random() < 0.2;
      if (showJacket) {
        picks.push({ item: pick(closet.jackets), slot: 'jackets' });
      } else if (closet.tops.length > 0) {
        picks.push({ item: pick(closet.tops), slot: 'tops' });
      }
      // OG: bottoms and shortbottoms share one pool, each keeps its own slot
      const allBottoms = [
        ...closet.bottoms.map(i => ({ item: i, slot: 'bottoms' })),
        ...closet.shortbottoms.map(i => ({ item: i, slot: 'shortbottoms' }))
      ];
      if (allBottoms.length > 0) picks.push(pick(allBottoms));
    }

    // bag: always when it exists (OG behavior)
    if (closet.bags.length > 0) {
      picks.push({ item: pick(closet.bags), slot: 'bags' });
    }

    // accessory: always when it exists (OG behavior)
    if (closet.accessories.length > 0) {
      picks.push({ item: pick(closet.accessories), slot: 'accessories' });
    }

    // one footwear only: shoes or boots, coin flip when both exist (OG behavior)
    const footPool = [];
    if (closet.shoes.length > 0) footPool.push('shoes');
    if (closet.boots.length > 0) footPool.push('boots');
    if (footPool.length > 0) {
      const footCat = pick(footPool);
      picks.push({ item: pick(closet[footCat]), slot: footCat });
    }

    if (picks.length === 0) {
      canvas.innerHTML = '<div class="canvas-empty">no shuffleable finds yet —<br>post some tops, bottoms, shoes ✿</div>';
      lastPicks = null;
      return;
    }

    lastPicks = picks;
    renderPicks(picks);
  };

  function renderPicks(picks) {
    const canvas = document.getElementById('outfitCanvas');
    canvas.innerHTML = '';
    selectedTile = null;
    currentTiles = [];
    updateEditControls();
    picks.forEach(({ item, slot }, i) => {
      const s = SLOTS[layoutMode][slot];
      const tile = document.createElement('div');
      tile.className = 'collage-tile';
      let css = 'z-index:' + s.z + '; width:' + s.width + '; height:' + s.height + ';';
      if (s.left) css += 'left:' + s.left + ';';
      if (s.right) css += 'right:' + s.right + ';';
      if (s.top) css += 'top:' + s.top + ';';
      if (s.bottom) css += 'bottom:' + s.bottom + ';';
      if (s.tx) css += 'transform: translateX(-50%);';
      css += 'animation: tileIn 0.25s ease ' + (i * 0.05) + 's backwards;';
      tile.style.cssText = css;

      const img = document.createElement('img');
      img.src = item.imageUrl;
      img.alt = '';
      tile.appendChild(img);

      makeTileInteractive(tile, item);
      canvas.appendChild(tile);
      currentTiles.push({ tile: tile, item: item, slot: slot });
    });
  }

  // ═══ EDIT MODE ═══
  let editMode = false;
  let selectedTile = null;
  let topZ = 10;

  window.toggleEditMode = function() {
    editMode = !editMode;
    const canvas = document.getElementById('outfitCanvas');
    canvas.classList.toggle('editing', editMode);
    const btn = document.getElementById('editBtn');
    btn.classList.toggle('active', editMode);
    btn.textContent = editMode ? 'done' : '✎';
    document.getElementById('editHint').classList.toggle('show', editMode);
    document.getElementById('ogHint').style.display = editMode ? 'none' : 'block';
    if (!editMode) {
      if (selectedTile) selectedTile.classList.remove('selected');
      selectedTile = null;
    }
    updateEditControls();
  };

  function updateEditControls() {
    document.getElementById('editControls').classList.toggle('show', editMode && !!selectedTile);
  }

  function selectTile(tile) {
    if (selectedTile) selectedTile.classList.remove('selected');
    selectedTile = tile;
    tile.classList.add('selected');
    updateEditControls();
  }

  // Convert a tile from slot-based positioning (%, right/bottom, translateX)
  // to plain px left/top so dragging and resizing are simple
  function pinTileToPixels(tile) {
    if (tile.dataset.pinned) return;
    const canvas = document.getElementById('outfitCanvas');
    const cr = canvas.getBoundingClientRect();
    const tr = tile.getBoundingClientRect();
    tile.style.animation = 'none';
    tile.style.width = tr.width + 'px';
    tile.style.height = tr.height + 'px';
    tile.style.left = (tr.left - cr.left) + 'px';
    tile.style.top = (tr.top - cr.top) + 'px';
    tile.style.right = 'auto';
    tile.style.bottom = 'auto';
    tile.style.transform = 'none';
    tile.dataset.pinned = '1';
  }

  function makeTileInteractive(tile, item) {
    // shop-mode click
    tile.addEventListener('click', (e) => {
      if (editMode) return; // handled by touch/mouse selection below
      if (item.link) window.open(item.link, '_blank');
    });
    if (item.link) tile.title = 'shop this piece';

    // edit-mode drag: immediate on touch/mouse, no long-press
    let dragging = false;
    let startX = 0, startY = 0, startLeft = 0, startTop = 0;
    let moved = false;

    function dragStart(clientX, clientY) {
      pinTileToPixels(tile);
      selectTile(tile);
      dragging = true;
      moved = false;
      startX = clientX;
      startY = clientY;
      startLeft = parseFloat(tile.style.left);
      startTop = parseFloat(tile.style.top);
    }

    function dragMove(clientX, clientY) {
      if (!dragging) return;
      const dx = clientX - startX;
      const dy = clientY - startY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
      tile.style.left = (startLeft + dx) + 'px';
      tile.style.top = (startTop + dy) + 'px';
    }

    function dragEnd() { dragging = false; }

    tile.addEventListener('touchstart', (e) => {
      if (!editMode) return;
      e.preventDefault(); // stop page scroll while arranging
      const t = e.touches[0];
      dragStart(t.clientX, t.clientY);
    }, { passive: false });

    tile.addEventListener('touchmove', (e) => {
      if (!editMode || !dragging) return;
      e.preventDefault();
      const t = e.touches[0];
      dragMove(t.clientX, t.clientY);
    }, { passive: false });

    tile.addEventListener('touchend', () => { if (editMode) dragEnd(); });

    // mouse (desktop testing)
    tile.addEventListener('mousedown', (e) => {
      if (!editMode) return;
      e.preventDefault();
      dragStart(e.clientX, e.clientY);
      const mm = (ev) => dragMove(ev.clientX, ev.clientY);
      const mu = () => { dragEnd(); document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
      document.addEventListener('mousemove', mm);
      document.addEventListener('mouseup', mu);
    });
  }

  window.resizeSelected = function(dir) {
    if (!selectedTile) return;
    pinTileToPixels(selectedTile);
    const w = parseFloat(selectedTile.style.width);
    const h = parseFloat(selectedTile.style.height);
    const f = dir > 0 ? 1.12 : 0.89;
    const nw = Math.max(30, w * f);
    const nh = Math.max(30, h * f);
    // grow/shrink from the center so the piece doesn't wander
    const l = parseFloat(selectedTile.style.left);
    const t = parseFloat(selectedTile.style.top);
    selectedTile.style.left = (l - (nw - w) / 2) + 'px';
    selectedTile.style.top = (t - (nh - h) / 2) + 'px';
    selectedTile.style.width = nw + 'px';
    selectedTile.style.height = nh + 'px';
  };

  window.saveOutfit = async function() {
    const btn = document.getElementById('saveBtn');
    if (!currentTiles || currentTiles.length === 0) {
      btn.textContent = 'shuffle first!';
      setTimeout(() => { btn.textContent = 'save this ♡'; }, 1500);
      return;
    }
    const user = auth.currentUser;
    if (!user) {
      btn.textContent = 'log in on girlchan to save';
      setTimeout(() => { btn.textContent = 'save this ♡'; }, 2200);
      return;
    }
    btn.disabled = true;
    btn.textContent = 'saving...';
    try {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      const userData = userDoc.exists() ? userDoc.data() : {};
      if (userData.premium !== true) {
        btn.textContent = 'saving outfits is a premium perk ✦';
        setTimeout(() => { btn.textContent = 'save this ♡'; btn.disabled = false; }, 2500);
        return;
      }
      const canvas = document.getElementById('outfitCanvas');
      const cr = canvas.getBoundingClientRect();
      const pieces = currentTiles.map(({ tile, item, slot }) => {
        const tr = tile.getBoundingClientRect();
        const cs = window.getComputedStyle(tile);
        return {
          imageId: item.id || '',
          imageUrl: item.imageUrl,
          link: item.link || '',
          tags: item.tags || [],
          slot: slot,
          l: +(((tr.left - cr.left) / cr.width) * 100).toFixed(2),
          t: +(((tr.top - cr.top) / cr.height) * 100).toFixed(2),
          w: +((tr.width / cr.width) * 100).toFixed(2),
          h: +((tr.height / cr.height) * 100).toFixed(2),
          z: parseInt(cs.zIndex, 10) || 1
        };
      });
      await addDoc(collection(db, 'outfits'), {
        userId: user.uid,
        username: userData.username || 'someone',
        createdAt: new Date(),
        layout: layoutMode,
        canvasW: Math.round(cr.width),
        canvasH: Math.round(cr.height),
        source: closetSource || null,
        pieces: pieces
      });
      btn.textContent = 'saved to /outfits ♥';
      btn.classList.add('saved');
      setTimeout(() => {
        btn.textContent = 'save this ♡';
        btn.classList.remove('saved');
        btn.disabled = false;
      }, 2500);
    } catch (err) {
      console.error('save outfit error:', err);
      btn.textContent = 'try again';
      btn.disabled = false;
    }
  };

  window.layerSelected = function(dir) {
    if (!selectedTile) return;
    if (dir > 0) {
      topZ++;
      selectedTile.style.zIndex = topZ;
    } else {
      const z = parseInt(selectedTile.style.zIndex || '1', 10);
      selectedTile.style.zIndex = Math.max(0, z - 2);
    }
  };

  async function loadCloset() {
    const params = new URLSearchParams(window.location.search);
    const paramUser = params.get('u');
    const paramCollection = params.get('c');

    // wait for auth to settle so we can default to the logged-in user
    const user = await new Promise((resolve) => {
      const unsub = onAuthStateChanged(auth, (u) => { unsub(); resolve(u); });
    });

    const sub = document.getElementById('ogSubtitle');
    const note = document.getElementById('closetNote');

    try {
      if (paramCollection) {
        // ── collection mode: shuffle from a collection's filed items ──
        const colDoc = await getDoc(doc(db, 'collections', paramCollection));
        if (!colDoc.exists()) {
          sub.textContent = "couldn't find that collection";
          return;
        }
        const colName = colDoc.data().name || 'collection';
        closetSource = { type: 'collection', id: paramCollection, name: colName };
        const imageIds = colDoc.data().images || [];
        for (const imageId of imageIds) {
          try {
            const imageDoc = await getDoc(doc(db, 'images', imageId));
            if (!imageDoc.exists()) continue;
            const data = imageDoc.data();
            const cat = bucketItem(data.tags);
            if (cat) {
              closet[cat].push({ id: imageDoc.id, imageUrl: data.imageUrl, link: data.link || '', tags: data.tags || [] });
              totalShuffleable++;
            }
          } catch (e) {}
        }
        sub.innerHTML = 'shuffling <span>/ ' + colName + '</span> — ' + totalShuffleable + ' pieces';
        if (totalShuffleable === 0) {
          document.getElementById('canvasEmpty').innerHTML = 'nothing shuffleable in this collection yet —<br>file finds with item tags into it ✿';
          return;
        }
        note.innerHTML = 'pulls from the <span style="color:#0600ff;">/ ' + colName + '</span> collection — file more finds to grow the pool';
      } else {
        // ── closet mode: a user's own uploads ──
        const targetUid = paramUser || (user ? user.uid : null);
        if (!targetUid) {
          sub.innerHTML = 'log in on <a href="/" style="color:#0600ff;">girlchan</a> to shuffle your closet';
          document.getElementById('canvasEmpty').textContent = 'no closet to shuffle';
          return;
        }
        let username = 'someone';
        try {
          const userDoc = await getDoc(doc(db, 'users', targetUid));
          if (userDoc.exists() && userDoc.data().username) username = userDoc.data().username;
        } catch (e) {}
        closetOwner = username;
        closetSource = { type: 'user', id: targetUid, name: username };

        const snap = await getDocs(query(collection(db, 'images'), orderBy('createdAt', 'desc')));
        snap.forEach((d) => {
          const data = d.data();
          if (data.userId !== targetUid) return;
          const cat = bucketItem(data.tags);
          if (cat) {
            closet[cat].push({ id: d.id, imageUrl: data.imageUrl, link: data.link || '', tags: data.tags || [] });
            totalShuffleable++;
          }
        });

        sub.innerHTML = 'shuffling <span>' + username + '.finds</span> closet — ' + totalShuffleable + ' pieces';
        if (totalShuffleable === 0) {
          document.getElementById('canvasEmpty').innerHTML = 'nothing shuffleable in this closet yet —<br>post finds with item tags (tops, shoes, bags...) ✿';
          return;
        }
        note.innerHTML = 'pulls from <span style="color:#0600ff;">' + username + '</span>\u2019s girlchan finds automatically — every new post joins the closet';
      }

      document.getElementById('shuffleBtn').disabled = false;
      document.getElementById('saveBtn').disabled = false;

      // auto-shuffle once on load so the page never opens empty
      window.shuffleOutfit();
    } catch (err) {
      console.error('Error loading closet:', err);
      sub.textContent = 'something went wrong — try refreshing';
    }
  }

  loadCloset();
</script>

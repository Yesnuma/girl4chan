<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>explore - girlchan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', Courier, monospace;
    background-color: #f0e0d6;
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 16px;
  }
  .explore-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid #0600ff;
}
  .back-link {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #0600ff;
    text-decoration: none;
    cursor: pointer;
  }
  .back-link:hover { text-decoration: underline; }
  .page-title {
    font-size: 16px;
    color: #000;
    font-weight: bold;
    margin-bottom: 16px;
  }
  #exploreGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }
  .explore-tile {
    width: 100%;
    aspect-ratio: 4/5;
    object-fit: cover;
    display: block;
    cursor: pointer;
    background: #fff;
  }
  .loading-msg, .error-msg {
    text-align: center;
    font-size: 12px;
    color: #666;
    padding: 40px 20px;
    grid-column: 1 / -1;
  }
  
  #loadMoreBtn {
    display: none;
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: #0600ff;
    color: #F9FF00;
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
  }
  #loadMoreBtn:disabled {
    opacity: 0.6;
    cursor: wait;
  }
  
  .ebay-modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 9999;
    align-items: center;
    justify-content: center;
  }
  .ebay-modal-content {
    max-width: 360px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 16px;
    background: #fff;
    display: flex;
    flex-direction: column;
    font-family: 'Courier New', monospace;
  }
  .ebay-modal-img {
    width: 100%;
    max-height: 50vh;
    object-fit: contain;
    margin-bottom: 16px;
    background: #f5f5f5;
  }
  .ebay-modal-title {
    font-size: 13px;
    line-height: 1.4;
    margin-bottom: 8px;
    color: #000;
  }
  .ebay-modal-price {
    font-size: 16px;
    font-weight: bold;
    color: #0600ff;
    margin-bottom: 16px;
  }
  .ebay-modal-btn {
    width: 100%;
    padding: 12px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 8px;
    border: 2px solid #0600ff;
    background: #0600ff;
    color: #fff;
    text-decoration: none;
    text-align: center;
    display: block;
  }
  .ebay-modal-btn-secondary {
    background: #fff;
    color: #0600ff;
  }
  .ebay-modal-btn-tertiary {
    background: #f5f5f5;
    color: #000;
    border: 2px solid #ccc;
  }
</style>
</head>
<body>

<div class="explore-header">
  <a href="#" onclick="history.back(); return false;" class="back-link">← back</a>
  <a href="/" class="back-link">← home</a>
</div>

<h1 class="page-title">go deeper ↓</h1>

<div id="exploreGrid">
  <p class="loading-msg">loading...</p>
</div>

<button id="loadMoreBtn" onclick="loadMore()">load more →</button>

<div class="ebay-modal-overlay" id="ebayItemModal" onclick="closeEbayModalIfOverlay(event)">
  <div class="ebay-modal-content">
    <img class="ebay-modal-img" id="ebayModalImg" alt="">
    <div class="ebay-modal-title" id="ebayModalTitle"></div>
    <div class="ebay-modal-price" id="ebayModalPrice"></div>
    <a class="ebay-modal-btn" id="ebayModalShopBtn" target="_blank" rel="noopener" href="#">shop on eBay →</a>
    <a class="ebay-modal-btn ebay-modal-btn-secondary" id="ebayModalExploreBtn" href="#">explore this deeper →</a>
    <button class="ebay-modal-btn ebay-modal-btn-secondary" onclick="fileForLater()">file for later</button>
    <button class="ebay-modal-btn ebay-modal-btn-tertiary" onclick="closeEbayModal()">close</button>
  </div>
</div>

<script>
var allItems = [];
var currentOffset = 0;
var pageLimit = 50;
var sourceImageUrl = '';
var noMoreResults = false;

async function loadExploreGrid(append) {
  var grid = document.getElementById('exploreGrid');
  
  if (!append) {
    var params = new URLSearchParams(window.location.search);
    sourceImageUrl = params.get('img');
    if (!sourceImageUrl) {
      grid.innerHTML = '<p class="error-msg">no image specified — go back and try again</p>';
      return;
    }
    currentOffset = 0;
    noMoreResults = false;
    allItems = [];
    grid.innerHTML = '<p class="loading-msg">loading...</p>';
  }
  
  try {
    var res = await fetch('/.netlify/functions/searchByImage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageUrl: sourceImageUrl, limit: pageLimit, offset: currentOffset })
    });
    var data = await res.json();
    var items = data.itemSummaries || [];
    
    if (items.length === 0 && !append) {
      grid.innerHTML = '<p class="error-msg">no similar items found on eBay</p>';
      hideLoadMore();
      return;
    }
    
    if (items.length === 0 && append) {
      noMoreResults = true;
      hideLoadMore();
      return;
    }
    
    if (items.length < pageLimit) {
      noMoreResults = true;
    }
    
    var startIndex = allItems.length;
    for (var j = 0; j < items.length; j++) {
      allItems.push(items[j]);
    }
    currentOffset = currentOffset + pageLimit;
    
    var html = append ? grid.innerHTML : '';
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var img = '';
      if (item.image && item.image.imageUrl) img = item.image.imageUrl;
      else if (item.thumbnailImages && item.thumbnailImages[0]) img = item.thumbnailImages[0].imageUrl;
      var title = (item.title || '').replace(/"/g, '&quot;');
      var hiResImg = img.replace(/s-l\d+\.jpg/, 's-l1600.jpg').replace(/s-l\d+\.webp/, 's-l1600.webp');
      var globalIndex = startIndex + i;
      html = html + '<img class="explore-tile" src="' + hiResImg + '" alt="' + title + '" loading="lazy" onclick="openEbayModal(' + globalIndex + ')">';
    }
    grid.innerHTML = html;
    
    if (noMoreResults) {
      hideLoadMore();
    } else {
      showLoadMore();
    }
  } catch (err) {
    grid.innerHTML = '<p class="error-msg">something went wrong — try again</p>';
    hideLoadMore();
  }
}

function showLoadMore() {
  var btn = document.getElementById('loadMoreBtn');
  btn.style.display = 'block';
  btn.disabled = false;
  btn.textContent = 'load more →';
}

function hideLoadMore() {
  document.getElementById('loadMoreBtn').style.display = 'none';
}

async function loadMore() {
  var btn = document.getElementById('loadMoreBtn');
  btn.disabled = true;
  btn.textContent = 'loading...';
  await loadExploreGrid(true);
}

function openEbayModal(index) {
  var item = allItems[index];
  if (!item) return;
  
  var img = '';
  if (item.image && item.image.imageUrl) img = item.image.imageUrl;
  else if (item.thumbnailImages && item.thumbnailImages[0]) img = item.thumbnailImages[0].imageUrl;
  img = img.replace(/s-l\d+\.jpg/, 's-l1600.jpg').replace(/s-l\d+\.webp/, 's-l1600.webp');
  
  var price = '';
  if (item.price && item.price.value) price = '$' + item.price.value;
  
  var shopUrl = item.itemAffiliateWebUrl || item.itemWebUrl || '#';
  var exploreUrl = '/explore.html?img=' + encodeURIComponent(img);
  
  document.getElementById('ebayModalImg').src = img;
  document.getElementById('ebayModalTitle').textContent = item.title || '';
  document.getElementById('ebayModalPrice').textContent = price;
  document.getElementById('ebayModalShopBtn').href = shopUrl;
  document.getElementById('ebayModalExploreBtn').href = exploreUrl;
  document.getElementById('ebayItemModal').style.display = 'flex';
}

function closeEbayModal() {
  document.getElementById('ebayItemModal').style.display = 'none';
}

function closeEbayModalIfOverlay(event) {
  if (event.target.id === 'ebayItemModal') closeEbayModal();
}

function fileForLater() {
  console.log('filed for later — cabinet UI coming later');
  alert('saved to file cabinet (coming soon)');
}

loadExploreGrid(false);
</script>

</body>
</html>

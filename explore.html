<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>explore - girlchan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', Courier, monospace;
    background-color: #f0e0d6;
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 16px;
  }
  .explore-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #0600ff;
  }
  .back-link {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #0600ff;
    text-decoration: none;
    cursor: pointer;
  }
  .back-link:hover { text-decoration: underline; }
  .page-title {
    font-size: 16px;
    color: #000;
    font-weight: bold;
    margin-bottom: 16px;
  }

  .search-bar-wrap {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    align-items: stretch;
  }
  .search-bar {
    flex: 1;
    min-height: 38px;
    background: #fff;
    border: 1px solid #0600ff;
    padding: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
  }
  .search-bar-empty {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #999;
    padding: 4px;
  }
  .word-bubble {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    background: #9ED2F5;
    color: #000;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: default;
  }
  .word-bubble .x {
    cursor: pointer;
    font-weight: bold;
    padding: 0 2px;
  }
  .word-bubble .x:hover { color: #0600ff; }
  .save-words-btn {
    background: #fff;
    color: #0600ff;
    border: 1px solid #0600ff;
    padding: 0 10px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
  }
  .save-words-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .go-btn {
    background: #0600ff;
    color: #F9FF00;
    border: none;
    padding: 0 14px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    font-weight: bold;
  }
  .go-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .cabinet-wrap {
    margin-bottom: 12px;
    border: 1px solid #0600ff;
    background: #fff;
  }
  .cabinet-toggle {
    width: 100%;
    padding: 8px 12px;
    background: #fff;
    color: #0600ff;
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    font-weight: bold;
  }
  .cabinet-toggle:hover { background: #f0e0d6; }
  .cabinet-panel {
    display: none;
    padding: 8px 12px 12px 12px;
    border-top: 1px dashed #0600ff;
  }
  .cabinet-panel.open { display: block; }
  .cabinet-empty {
    font-size: 11px;
    color: #999;
    padding: 4px 0;
  }
  .cabinet-section-label {
    font-size: 10px;
    color: #0600ff;
    text-transform: uppercase;
    margin: 6px 0 4px 0;
    letter-spacing: 0.5px;
  }
  .cabinet-items {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .cabinet-item {
    position: relative;
    width: 60px;
    height: 75px;
  }
  .cabinet-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    cursor: pointer;
    display: block;
    background: #f5f5f5;
  }
  .cabinet-item .remove-btn {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #0600ff;
    color: #F9FF00;
    border: none;
    font-size: 10px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    font-family: 'Courier New', monospace;
  }
  .cabinet-words {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .cabinet-word-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    background: #FF007A;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
  }
  .cabinet-word-row:hover { opacity: 0.85; }
  .cabinet-word-row .label { flex: 1; }
  .cabinet-word-row .remove-btn {
    background: transparent;
    color: #fff;
    border: none;
    cursor: pointer;
    padding: 0 4px;
    font-weight: bold;
    font-family: 'Courier New', monospace;
  }

  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
    min-height: 28px;
  }
  .chip {
    padding: 5px 10px;
    background: transparent;
    border: 1px solid #0600ff;
    color: #0600ff;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
  }
  .chip:hover { background: #0600ff; color: #F9FF00; }
  .chip.added {
    opacity: 0.3;
    cursor: not-allowed;
    pointer-events: none;
  }

  #exploreGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }
  .explore-tile {
    width: 100%;
    aspect-ratio: 4/5;
    object-fit: cover;
    display: block;
    cursor: pointer;
    background: #fff;
  }
  .loading-msg, .error-msg {
    text-align: center;
    font-size: 12px;
    color: #666;
    padding: 40px 20px;
    grid-column: 1 / -1;
  }

  #loadMoreBtn {
    display: none;
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: #0600ff;
    color: #F9FF00;
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
  }
  #loadMoreBtn:disabled {
    opacity: 0.6;
    cursor: wait;
  }

  .ebay-modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 9999;
    align-items: center;
    justify-content: center;
  }
  .ebay-modal-content {
    max-width: 360px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 16px;
    background: #fff;
    display: flex;
    flex-direction: column;
    font-family: 'Courier New', monospace;
  }
  .ebay-modal-img {
    width: 100%;
    max-height: 50vh;
    object-fit: contain;
    margin-bottom: 16px;
    background: #f5f5f5;
  }
  .ebay-modal-title {
    font-size: 13px;
    line-height: 1.4;
    margin-bottom: 8px;
    color: #000;
  }
  .ebay-modal-price {
    font-size: 16px;
    font-weight: bold;
    color: #0600ff;
    margin-bottom: 16px;
  }
  .ebay-modal-btn {
    width: 100%;
    padding: 12px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 8px;
    border: 2px solid #0600ff;
    background: #0600ff;
    color: #fff;
    text-decoration: none;
    text-align: center;
    display: block;
  }
  .ebay-modal-btn-tertiary {
    background: #f5f5f5;
    color: #000;
    border: 2px solid #ccc;
  }

  .ebay-icon-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .ebay-icon-btn {
    border: 2px solid #0600ff;
    background: #fff;
    padding: 10px 4px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    text-decoration: none;
  }
  .ebay-icon-btn:hover { background: #f0e0d6; }
  .ebay-icon-btn.add-btn { background: #9ED2F5; }
  .ebay-icon-btn.add-btn:hover { background: #7ec3ed; }
  .ebay-icon-btn .icon-label {
    font-size: 10px;
    color: #0600ff;
  }
  .ebay-icon-btn svg {
    stroke: #0600ff;
  }
  .ebay-icon-btn.is-loading svg { display: none; }
  .ebay-icon-btn .spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 2px solid #0600ff;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .ebay-icon-btn.is-loading .spinner { display: block; }
  .ebay-icon-btn .check {
    display: none;
    width: 20px;
    height: 20px;
    line-height: 20px;
    text-align: center;
    color: #0600ff;
    font-size: 18px;
    font-weight: bold;
  }
  .ebay-icon-btn.is-success .spinner { display: none; }
  .ebay-icon-btn.is-success svg { display: none; }
  .ebay-icon-btn.is-success .check { display: block; }
  .ebay-icon-btn.is-error svg { display: none; }
  .ebay-icon-btn.is-error .spinner { display: none; }
  .ebay-icon-btn.is-error .check {
    display: block;
    color: #c00;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<div class="explore-header">
  <a href="#" onclick="history.back(); return false;" class="back-link">← back</a>
  <a href="/" class="back-link">← home</a>
</div>

<h1 class="page-title">go deeper ↓</h1>

<div class="search-bar-wrap">
  <div class="search-bar" id="searchBar">
    <span class="search-bar-empty" id="searchBarEmpty">tap chips below to start a search</span>
  </div>
  <button class="save-words-btn" id="saveWordsBtn" onclick="saveCurrentWords()" disabled title="save current words to cabinet">📁+</button>

<div class="cabinet-wrap">
  <button class="cabinet-toggle" id="cabinetToggle" onclick="toggleCabinet()">📁 cabinet (0)</button>
  <div class="cabinet-panel" id="cabinetPanel">
    <p class="cabinet-empty" id="cabinetEmpty">nothing filed yet — tap "file" on items, or 📁+ to save current words</p>
    <div id="cabinetItemsSection" style="display:none;">

      <div class="cabinet-items" id="cabinetItems"></div>

    <div id="cabinetWordsSection" style="display:none;">

<script>
var allItems = [];
var currentOffset = 0;
var pageLimit = 50;
var sourceImageUrl = '';
var noMoreResults = false;
var activeWords = [];
var currentMode = 'image';
var currentModalItem = null;

var cabinetItems = JSON.parse(sessionStorage.getItem('girlchan_cabinet_items') || '[]');
var cabinetWords = JSON.parse(sessionStorage.getItem('girlchan_cabinet_words') || '[]');
var cabinetCounter = parseInt(sessionStorage.getItem('girlchan_cabinet_counter') || '0', 10);

function saveCabinet() {
  sessionStorage.setItem('girlchan_cabinet_items', JSON.stringify(cabinetItems));
  sessionStorage.setItem('girlchan_cabinet_words', JSON.stringify(cabinetWords));
  sessionStorage.setItem('girlchan_cabinet_counter', String(cabinetCounter));
}

function getSearchBody() {
  var body = { limit: pageLimit, offset: currentOffset };
  if (currentMode === 'word') body.query = activeWords.join(' ');
  else body.imageUrl = sourceImageUrl;
  return body;
}

async function loadExploreGrid(append) {
  var grid = document.getElementById('exploreGrid');
  if (!append) {
    if (currentMode === 'image') {
      var params = new URLSearchParams(window.location.search);
      sourceImageUrl = params.get('img');
      if (!sourceImageUrl) {
        grid.innerHTML = '<p class="error-msg">no image specified — go back and try again</p>';
        return;
      }
    }
    currentOffset = 0;
    noMoreResults = false;
    allItems = [];
    grid.innerHTML = '<p class="loading-msg">loading...</p>';
  }
  try {
    var res = await fetch('/.netlify/functions/searchByImage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(getSearchBody())
    });
    var data = await res.json();
    var items = data.itemSummaries || [];
    if (items.length === 0 && !append) {
      grid.innerHTML = '<p class="error-msg">no results — try removing a word or going back</p>';
      hideLoadMore();
      renderChips([]);
      return;
    }
    if (items.length === 0 && append) { noMoreResults = true; hideLoadMore(); return; }
    if (items.length < pageLimit) noMoreResults = true;
    var startIndex = allItems.length;
    for (var j = 0; j < items.length; j++) allItems.push(items[j]);
    currentOffset = currentOffset + pageLimit;
    var html = append ? grid.innerHTML : '';
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var img = '';
      if (item.image && item.image.imageUrl) img = item.image.imageUrl;
      else if (item.thumbnailImages && item.thumbnailImages[0]) img = item.thumbnailImages[0].imageUrl;
      var title = (item.title || '').replace(/"/g, '&quot;');
      var hiResImg = img.replace(/s-l\d+\.jpg/, 's-l1600.jpg').replace(/s-l\d+\.webp/, 's-l1600.webp');
      var globalIndex = startIndex + i;
      html = html + '<img class="explore-tile" src="' + hiResImg + '" alt="' + title + '" loading="lazy" onclick="openEbayModal(' + globalIndex + ')">';
    }
    grid.innerHTML = html;
    if (!append) renderChips(mineTopWords(allItems));
    if (noMoreResults) hideLoadMore(); else showLoadMore();
  } catch (err) {
    grid.innerHTML = '<p class="error-msg">something went wrong — try again</p>';
    hideLoadMore();
  }
}

function mineTopWords(items) {
  var counts = {};
  for (var i = 0; i < items.length; i++) {
    var title = (items[i].title || '').toLowerCase();
    title = title.replace(/[^a-z0-9\s]/g, ' ');
    var tokens = title.split(/\s+/).filter(function(t) { return t.length > 1; });
    for (var j = 0; j < tokens.length; j++) counts[tokens[j]] = (counts[tokens[j]] || 0) + 1;
    for (var k = 0; k < tokens.length - 1; k++) {
      var bg = tokens[k] + ' ' + tokens[k + 1];
      counts[bg] = (counts[bg] || 0) + 1;
    }
  }
  var entries = [];
  for (var key in counts) if (counts[key] >= 2) entries.push([key, counts[key]]);
  entries.sort(function(a, b) { return b[1] - a[1]; });
  var activeSet = {};
  for (var m = 0; m < activeWords.length; m++) activeSet[activeWords[m].toLowerCase()] = true;
  var picked = [];
  for (var n = 0; n < entries.length && picked.length < 10; n++) {
    if (!activeSet[entries[n][0]]) picked.push(entries[n][0]);
  }
  return picked;
}

function renderChips(words) {
  var row = document.getElementById('chipRow');
  if (!words || words.length === 0) { row.innerHTML = ''; return; }
  var html = '';
  for (var i = 0; i < words.length; i++) {
    var w = words[i].replace(/'/g, '&#39;');
    html += '<button class="chip" onclick="addWord(\'' + w + '\')">' + words[i] + '</button>';
  }
  row.innerHTML = html;
}

function renderSearchBar() {
  var bar = document.getElementById('searchBar');
  var goBtn = document.getElementById('goBtn');
  var saveBtn = document.getElementById('saveWordsBtn');
  if (activeWords.length === 0) {
    bar.innerHTML = '<span class="search-bar-empty">tap chips below to start a search</span>';
    goBtn.disabled = true;
    saveBtn.disabled = true;
    return;
  }
  var html = '';
  for (var i = 0; i < activeWords.length; i++) {
    var w = activeWords[i].replace(/'/g, '&#39;');
    html += '<span class="word-bubble">' + activeWords[i] + ' <span class="x" onclick="removeWord(\'' + w + '\')">×</span></span>';
  }
  bar.innerHTML = html;
  goBtn.disabled = false;
  saveBtn.disabled = false;
}

function addWord(word) {
  if (activeWords.indexOf(word) === -1) {
    activeWords.push(word);
    renderSearchBar();
    var chips = document.querySelectorAll('.chip');
    for (var i = 0; i < chips.length; i++) {
      if (chips[i].textContent === word) chips[i].classList.add('added');
    }
  }
}

function removeWord(word) {
  var idx = activeWords.indexOf(word);
  if (idx !== -1) {
    activeWords.splice(idx, 1);
    renderSearchBar();
    if (activeWords.length === 0 && currentMode === 'word') {
      currentMode = 'image';
      loadExploreGrid(false);
    }
  }
}

function runWordSearch() {
  if (activeWords.length === 0) return;
  currentMode = 'word';
  loadExploreGrid(false);
}

function fileForLater() {
  if (!currentModalItem) return;
  var item = currentModalItem;
  var img = '';
  if (item.image && item.image.imageUrl) img = item.image.imageUrl;
  else if (item.thumbnailImages && item.thumbnailImages[0]) img = item.thumbnailImages[0].imageUrl;
  img = img.replace(/s-l\d+\.jpg/, 's-l1600.jpg').replace(/s-l\d+\.webp/, 's-l1600.webp');
  cabinetCounter++;
  cabinetItems.push({
    id: 'i' + cabinetCounter,
    title: item.title || '',
    price: (item.price && item.price.value) ? '$' + item.price.value : '',
    img: img,
    shopUrl: item.itemAffiliateWebUrl || item.itemWebUrl || '#',
    itemId: item.itemId || ''
  });
  saveCabinet();
  renderCabinet();
  closeEbayModal();
}

function saveCurrentWords() {
  if (activeWords.length === 0) return;
  cabinetCounter++;
  cabinetWords.push({ id: 'w' + cabinetCounter, words: activeWords.slice() });
  saveCabinet();
  renderCabinet();
}

function removeCabinetItem(id) {
  cabinetItems = cabinetItems.filter(function(c) { return c.id !== id; });
  saveCabinet();
  renderCabinet();
}

function removeCabinetWords(id) {
  cabinetWords = cabinetWords.filter(function(c) { return c.id !== id; });
  saveCabinet();
  renderCabinet();
}

function openCabinetItem(id) {
  var entry = null;
  for (var i = 0; i < cabinetItems.length; i++) if (cabinetItems[i].id === id) { entry = cabinetItems[i]; break; }
  if (!entry) return;
  document.getElementById('ebayModalImg').src = entry.img;
  document.getElementById('ebayModalTitle').textContent = entry.title;
  document.getElementById('ebayModalPrice').textContent = entry.price;
  document.getElementById('ebayModalShopBtn').href = entry.shopUrl;
  document.getElementById('ebayModalExploreBtn').href = '/explore.html?img=' + encodeURIComponent(entry.img);
  currentModalItem = {
    title: entry.title,
    image: { imageUrl: entry.img },
    price: entry.price ? { value: entry.price.replace('$', '') } : null,
    itemAffiliateWebUrl: entry.shopUrl,
    itemId: entry.itemId || ''
  };
  resetAddBtn();
  document.getElementById('ebayItemModal').style.display = 'flex';
}

function loadCabinetWords(id) {
  var entry = null;
  for (var i = 0; i < cabinetWords.length; i++) if (cabinetWords[i].id === id) { entry = cabinetWords[i]; break; }
  if (!entry) return;
  for (var j = 0; j < entry.words.length; j++) {
    if (activeWords.indexOf(entry.words[j]) === -1) activeWords.push(entry.words[j]);
  }
  renderSearchBar();
}

function toggleCabinet() {
  document.getElementById('cabinetPanel').classList.toggle('open');
}

function renderCabinet() {
  var total = cabinetItems.length + cabinetWords.length;
  document.getElementById('cabinetToggle').textContent = '📁 cabinet (' + total + ')';
  var emptyEl = document.getElementById('cabinetEmpty');
  var itemsSection = document.getElementById('cabinetItemsSection');
  var wordsSection = document.getElementById('cabinetWordsSection');
  if (total === 0) {
    emptyEl.style.display = 'block';
    itemsSection.style.display = 'none';
    wordsSection.style.display = 'none';
    return;
  }
  emptyEl.style.display = 'none';
  if (cabinetItems.length > 0) {
    itemsSection.style.display = 'block';
    var ihtml = '';
    for (var i = 0; i < cabinetItems.length; i++) {
      var ci = cabinetItems[i];
      ihtml += '<div class="cabinet-item">' +
        '<img src="' + ci.img + '" onclick="openCabinetItem(\'' + ci.id + '\')" alt="">' +
        '<button class="remove-btn" onclick="removeCabinetItem(\'' + ci.id + '\')">×</button>' +
        '</div>';
    }
    document.getElementById('cabinetItems').innerHTML = ihtml;
  } else {
    itemsSection.style.display = 'none';
  }
  if (cabinetWords.length > 0) {
    wordsSection.style.display = 'block';
    var whtml = '';
    for (var k = 0; k < cabinetWords.length; k++) {
      var cw = cabinetWords[k];
      var label = cw.words.join(' + ');
      whtml += '<div class="cabinet-word-row" onclick="loadCabinetWords(\'' + cw.id + '\')">' +
        '<span class="label">🏷️ ' + label + '</span>' +
        '<button class="remove-btn" onclick="event.stopPropagation(); removeCabinetWords(\'' + cw.id + '\')">×</button>' +
        '</div>';
    }
    document.getElementById('cabinetWords').innerHTML = whtml;
  } else {
    wordsSection.style.display = 'none';
  }
}

// ADD TO GIRLCHAN — real implementation
async function addToGirlchan() {
  if (!currentModalItem) return;
  var btn = document.getElementById('ebayModalAddBtn');
  var label = document.getElementById('addBtnLabel');
  if (btn.classList.contains('is-loading') || btn.classList.contains('is-success')) return;

  // wait for firebase to be ready (rare race condition)
  var gc = window.__girlchan;
  if (!gc || !gc.ready) {
    btn.classList.add('is-error');
    label.textContent = 'try again';
    setTimeout(resetAddBtn, 1500);
    return;
  }
  if (!gc.user) {
    window.location.href = '/';
    return;
  }

  btn.classList.add('is-loading');
  label.textContent = 'adding...';

  try {
    var item = currentModalItem;

    // get image url at high res
    var img = '';
    if (item.image && item.image.imageUrl) img = item.image.imageUrl;
    else if (item.thumbnailImages && item.thumbnailImages[0]) img = item.thumbnailImages[0].imageUrl;
    img = img.replace(/s-l\d+\.jpg/, 's-l1600.jpg').replace(/s-l\d+\.webp/, 's-l1600.webp');

    var ebayItemId = item.itemId || '';
    var shopUrl = item.itemAffiliateWebUrl || item.itemWebUrl || '';

    // duplicate check — has this user already added this exact eBay item?
    if (ebayItemId) {
      var existing = await gc.getDocs(
        gc.query(
          gc.collection(gc.db, 'images'),
          gc.where('userId', '==', gc.user.uid),
          gc.where('ebayItemId', '==', ebayItemId)
        )
      );
      if (!existing.empty) {
        btn.classList.remove('is-loading');
        btn.classList.add('is-success');
        label.textContent = 'already added';
        setTimeout(function() { closeEbayModal(); resetAddBtn(); }, 1500);
        return;
      }
    }

    // apply curator's affiliate code if they have one
    var userDoc = await gc.getDoc(gc.doc(gc.db, 'users', gc.user.uid));
    var campaignId = (userDoc.exists() && userDoc.data().ebayAffiliateCode) ? userDoc.data().ebayAffiliateCode : null;
    var finalLink = shopUrl;
    if (campaignId && finalLink && (finalLink.indexOf('ebay.com') !== -1 || finalLink.indexOf('ebay.us') !== -1)) {
      try {
        var url = new URL(finalLink);
        url.searchParams.set('campid', campaignId);
        finalLink = url.toString();
      } catch (e) {}
    }

    // write the doc — matches link-tab schema, with extra ebayItemId field
    var docRef = await gc.addDoc(gc.collection(gc.db, 'images'), {
      imageUrl: img,
      link: finalLink,
      userId: gc.user.uid,
      createdAt: new Date(),
      tags: [],
      aiTags: [],
      source: 'link',
      ebayItemId: ebayItemId
    });

    // background AI tagging — matches link-tab pattern
    setTimeout(async function() {
      try {
        var res = await fetch('/.netlify/functions/ai-tagger', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: img })
        });
        var tagData = await res.json();
        var bgTags = Array.isArray(tagData.tags) ? tagData.tags : [];
        if (bgTags.length > 0) {
          await gc.updateDoc(gc.doc(gc.db, 'images', docRef.id), {
            tags: bgTags,
            aiTags: bgTags
          });
        }
      } catch (e) {
        console.log('background tagging failed silently:', e);
      }
    }, 2000);

    // success state
    btn.classList.remove('is-loading');
    btn.classList.add('is-success');
    label.textContent = 'added!';
    setTimeout(function() {
      closeEbayModal();
      resetAddBtn();
    }, 1500);
  } catch (err) {
    console.error('add to girlchan error:', err);
    btn.classList.remove('is-loading');
    btn.classList.add('is-error');
    label.textContent = 'try again';
    setTimeout(resetAddBtn, 2000);
  }
}

function resetAddBtn() {
  var btn = document.getElementById('ebayModalAddBtn');
  var label = document.getElementById('addBtnLabel');
  if (!btn || !label) return;
  btn.classList.remove('is-loading');
  btn.classList.remove('is-success');
  btn.classList.remove('is-error');
  label.textContent = 'add';
}

function showLoadMore() {
  var btn = document.getElementById('loadMoreBtn');
  btn.style.display = 'block';
  btn.disabled = false;
  btn.textContent = 'load more →';
}
function hideLoadMore() {
  document.getElementById('loadMoreBtn').style.display = 'none';
}
async function loadMore() {
  var btn = document.getElementById('loadMoreBtn');
  btn.disabled = true;
  btn.textContent = 'loading...';
  await loadExploreGrid(true);
}

function openEbayModal(index) {
  var item = allItems[index];
  if (!item) return;
  currentModalItem = item;
  var img = '';
  if (item.image && item.image.imageUrl) img = item.image.imageUrl;
  else if (item.thumbnailImages && item.thumbnailImages[0]) img = item.thumbnailImages[0].imageUrl;
  img = img.replace(/s-l\d+\.jpg/, 's-l1600.jpg').replace(/s-l\d+\.webp/, 's-l1600.webp');
  var price = '';
  if (item.price && item.price.value) price = '$' + item.price.value;
  var shopUrl = item.itemAffiliateWebUrl || item.itemWebUrl || '#';
  var exploreUrl = '/explore.html?img=' + encodeURIComponent(img);
  document.getElementById('ebayModalImg').src = img;
  document.getElementById('ebayModalTitle').textContent = item.title || '';
  document.getElementById('ebayModalPrice').textContent = price;
  document.getElementById('ebayModalShopBtn').href = shopUrl;
  document.getElementById('ebayModalExploreBtn').href = exploreUrl;
  resetAddBtn();
  document.getElementById('ebayItemModal').style.display = 'flex';
}

function closeEbayModal() {
  document.getElementById('ebayItemModal').style.display = 'none';
  currentModalItem = null;
}
function closeEbayModalIfOverlay(event) {
  if (event.target.id === 'ebayItemModal') closeEbayModal();
}

renderSearchBar();
renderCabinet();
loadExploreGrid(false);
</script>
